version: 2
# ============================================================================
# OPEN PROBLEM REGISTRY
#
# Each entry is a research target in the Shadow Theory programme.
#
# Fields:
#   id / slug     - stable identifier; slug becomes the URL /problems/<slug>
#   title         - display title
#   domain        - topical domain label
#   programme     - featured | additional | legacy
#                   featured   -> shown in the main open-problem programme
#                   additional -> listed under further targets
#                   legacy     -> archived; shown only in the archive section
#   status        - public | draft  (draft entries are hidden)
#   maturity      - open | active | legacy-notes
#   legacy_notes  - true when an older manual MDX note exists for this slug.
#                   Those notes are historical drafts from the earlier
#                   Everything Equation era and are displayed behind a
#                   prominent historical-draft banner.
#   target        - neutral statement of the research target. Keep this
#                   inside the public claim boundary: it states what the
#                   programme aims at, not what has been established.
#
# To add a new open problem: copy a block, change the fields, and (optionally)
# add a note file at content/manual/problems/<slug>.mdx.
# ============================================================================
problems:
  # ----------------------------------------------------------------
  # FEATURED PROGRAMME
  # ----------------------------------------------------------------
  - id: standard-model
    slug: standard-model
    title: Standard Model Structure
    domain: Particle Physics
    programme: featured
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Whether the gauge group, fermion content, and family structure of the
      Standard Model can be constrained or derived within the Shadow Theory
      programme. Any such result requires its own public paper or record with
      declared assumptions, support appropriate to the claim, explicit
      limitations, and a clear claim boundary; earlier notes on this page are
      historical drafts.

  - id: fine-structure-constant
    slug: fine-structure-constant
    title: Fine-Structure Constant
    domain: Particle Physics
    programme: featured
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      A structural account of the fine-structure constant (the observed value
      near 1/137), treated as a downstream branch target. No public claim is
      currently made; earlier derivation notes are historical drafts pending
      reassessment against the seven-paper canonical sequence.

  - id: dark-sector
    slug: dark-sector
    title: Dark Sector
    domain: Cosmology / Particle Physics
    programme: featured
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Dark matter and dark-sector structure as branch targets of the
      programme: what any dark-sector proposal would need to establish —
      declared assumptions and domain, mathematical or empirical support
      appropriate to the claim, and explicit limitations — before a public
      claim is made.

  - id: cosmological-constant
    slug: cosmological-constant
    title: Cosmological Constant
    domain: Cosmology
    programme: featured
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      The value and smallness of the cosmological constant / dark energy
      density, held as a branch target. No current canonical paper claims a
      result on this problem; earlier framework-era discussion of it is
      historical.

  - id: quantum-gravity
    slug: quantum-gravity
    title: Quantum Gravity
    domain: Gravitation
    programme: featured
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      A consistent account of gravitation at quantum scales, approached
      through the programme's source-readout mathematics: which parts of the
      problem are readout artifacts, which reflect genuine nonclosure of the
      observable level, and what any proposed account must retain and
      justify.

  - id: quantum-measurement
    slug: quantum-measurement
    title: Quantum Measurement
    domain: Quantum Foundations
    programme: featured
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      The quantum measurement problem reframed through the distinction between
      bounded readouts and realization structure established in Paper 1, and
      the obstruction criterion of Paper 2.

  # ----------------------------------------------------------------
  # ADDITIONAL TARGETS
  # ----------------------------------------------------------------
  - id: three-fermion-generations
    slug: three-fermion-generations
    title: Three Fermion Generations
    domain: Particle Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Why exactly three fermion generations occur. Earlier notes asserting a
      forced N = 3 result belong to the superseded framework era and are
      retained as historical drafts; the question is held as an open branch
      target.

  - id: strong-cp
    slug: strong-cp
    title: Strong CP Problem
    domain: Particle Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      The vanishing or suppression of the QCD vacuum angle, held as an open
      branch target requiring its own public paper or record.

  - id: yukawa-prediction
    slug: yukawa-prediction
    title: Yukawa Couplings and Fermion Masses
    domain: Particle Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Structural constraints on Yukawa couplings and fermion mass patterns as
      a branch target of the programme.

  - id: spectral-action-yukawa-gap
    slug: spectral-action-yukawa-gap
    title: Spectral Action / Yukawa Gap
    domain: Mathematical Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      The gap between spectral-action-style bosonic structure and realistic
      Yukawa / fermion-mass data, treated as an open structural question.

  - id: grand-unified-theory
    slug: grand-unified-theory
    title: Unification Beyond the Standard Model
    domain: Particle Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Whether and how unification structure beyond the Standard Model can be
      posed as a well-formed completion target in the programme.

  - id: universal-spectral-fingerprint
    slug: universal-spectral-fingerprint
    title: Universal Spectral Fingerprint
    domain: Mathematical Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Whether a universal spectral signature of admissible structure can be
      characterized; held as an exploratory open target.

  - id: lawhood
    slug: lawhood
    title: Lawhood
    domain: Foundations of Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      What makes a candidate law a physical law. This was the organizing
      question of the earlier Everything Equation programme; it is now held as
      a branch target whose earlier treatments are historical background to
      the seven-paper canonical sequence.

  - id: lawhood-necessity
    slug: lawhood-necessity
    title: Lawhood Necessity
    domain: Foundations of Physics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Whether any viable notion of physical law forces a common certification
      architecture, restated as an open structural question under the
      seven-paper canonical sequence.

  - id: mathematical-foundations
    slug: mathematical-foundations
    title: Mathematical Foundations
    domain: Mathematics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      The foundational status of the closure, admissibility, and completion
      mathematics underlying the framework, including its relation to
      category-theoretic and proof-theoretic foundations.

  - id: navier-stokes
    slug: navier-stokes
    title: Navier-Stokes Regularity
    domain: Mathematics / PDE
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Global regularity of the three-dimensional Navier-Stokes equations,
      held as an external mathematical target; earlier notes are historical
      drafts.

  - id: arrow-of-time
    slug: arrow-of-time
    title: Arrow of Time
    domain: Statistical Mechanics
    programme: additional
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      The thermodynamic arrow of time examined through coarse-grained readout
      structure, connecting to the statistical-mechanics instance treated in
      Paper 1.

  # ----------------------------------------------------------------
  # LEGACY ARCHIVE
  # ----------------------------------------------------------------
  - id: consciousness-field-theorem
    slug: consciousness-field-theorem
    title: Consciousness Field Notes (Legacy)
    domain: Legacy
    programme: legacy
    status: public
    maturity: legacy-notes
    legacy_notes: true
    target: >
      Speculative notes from the earlier programme era, retained only as a
      historical draft. Not part of the current Shadow Theory research
      programme.
