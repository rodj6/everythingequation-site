# PAPER REGISTRY
#
# Three kinds of entries live here:
#
#  1. CANONICAL Shadow Theory papers (category: canonical). These are the
#     current public authority sequence (Papers 1-7, published 2026-07-15).
#     They carry their own title, summary, and zenodo/doi fields.
#
#  2. SUPERSEDED canonical versions (category: superseded). These are the
#     six June 2026 canonical papers that the seven-paper sequence replaced.
#     Their records stay published on Zenodo and their pages remain live,
#     clearly marked as superseded. They are NOT current authority.
#
#  3. HISTORICAL papers (no `category` field, or category: historical).
#     Earlier Everything Equation / Tier-0 / Tier-1 era records, retained
#     for archival completeness only.
#
#  To add a BRANCH paper later, use category: branch.
# ============================================================================
papers:
  # ============================================================
  # CANONICAL SHADOW THEORY SEQUENCE (Papers 1-7, 2026-07-15)
  # ============================================================
  - id: paper:shadow2:1
    slug: source-readout-non-equivalence
    number: 1
    category: canonical
    visibility: public
    featured: true
    title: "Source–Readout Non-Equivalence: Descent and Equivariant Reconstruction Obstructions"
    subtitle: "An exact readout quotient of a reduced source need not be equivalent to that source"
    role: "Establishes the foundational distinction: after declared redundancy is quotiented out, the readout presents the source exactly as a quotient while physically invariant relations can fail to descend and equivariant reconstruction can be obstructed."
    date: "2026-07-15"
    zenodo: 21369967
    doi: "10.5281/zenodo.21369967"
    summary: >
      Proves that when gauge and coordinate redundancy are quotiented out
      first, the public readout always presents the reduced source exactly as
      the quotient by equality of readouts. This exactness is fully
      compatible with non-equivalence. Two independent obstructions are
      established: a physically invariant source relation descends through the
      readout if and only if it is constant on every readout fiber, and a
      symmetry-compatible deterministic representative exists if and only if
      every readout stabilizer fixes a point of its fiber. A finite
      marked-carrier occupation model and the Hopf fibration realize both
      obstructions, keeping exact presentation, representative selection, and
      source equivalence rigorously apart.
    supports: []

  - id: paper:shadow2:2
    slug: target-relative-necessity-of-completion
    number: 2
    category: canonical
    visibility: public
    featured: true
    title: "Target-Relative Necessity of Completion: When Readout Loss Obstructs, and What a Sufficient Extension Must Retain"
    subtitle: "Whether discarded distinctions matter is a property of the question asked, not of the readout alone"
    role: "Makes obstruction target-relative: a question is answerable from the readout exactly when its correct answer never varies within a readout fiber, and every sufficient extension must separate states with different correct answers, with the joint target image as the coarsest such extension."
    date: "2026-07-15"
    zenodo: 21370501
    doi: "10.5281/zenodo.21370501"
    summary: >
      Determines exactly when distinctions discarded by a lossy readout matter.
      This paper proves a target is exactly
      solvable from the readout if and only if its correct-answer map is
      constant on every readout fiber; when that fails, the honest residual is
      the compatible-answer set, the pointwise-least sound set-valued rule, and every
      sufficient repair must separate states with different answers, with the
      joint target image as the universally coarsest completion. Realized
      concretely for flat U(1) connections on a circle, where curvature
      collapses the whole moduli space yet the charged spectrum needs only
      holonomy up to inversion.
    supports: []

  - id: paper:shadow2:3
    slug: canonical-minimal-source-completion
    number: 3
    category: canonical
    visibility: public
    featured: true
    title: "Canonical Minimal Source Completion: The Coarsest Readout Extension on Which a Nominated Family of Source Relations Becomes Well Defined"
    subtitle: "Existence, uniqueness, and exact minimality of the completion, without selecting any fiber representative"
    role: "Constructs the canonical minimal completion: for any nominated family of invariant source relations, the joint image of readout and relations is terminal among all relation-sufficient extensions, making it the coarsest enrichment on which every nominated relation becomes well defined."
    date: "2026-07-15"
    zenodo: 21370763
    doi: "10.5281/zenodo.21370763"
    summary: >
      Given a lossy readout and a nominated family of physically invariant
      relations that the readout fails to determine, this paper constructs the
      coarsest extension on which all of them become well defined: the joint
      image of readout and relations, equivalently the quotient by agreement of
      readout and every nominated relation. The completion is terminal: every
      sufficient extension maps uniquely onto it, giving existence, uniqueness
      up to unique isomorphism, and exact minimality with no fiber
      representative ever selected. Redundant and indispensable relation
      coordinates, refinement towers for nested families, the gauge-reduced
      form, and the topological form are all characterized.
    supports: []

  - id: paper:shadow2:4
    slug: geometric-realization-of-completed-source-relations
    number: 4
    category: canonical
    visibility: public
    featured: true
    title: "Geometric Realization of Completed Source Relations: Descent, Orbit Spaces, Invariant Relations, and Variational Response in Shadow Theory"
    subtitle: "When the abstract minimal completion is realized by genuine geometry, and how completed relations enter field equations"
    role: "Realizes the completion geometrically: compatible local data glue to global fields unique up to bundle isomorphism, invariant relations descend to the orbit space of physical configurations, and relation-dependent actions derive covariant responses in the Einstein, Yang–Mills, and matter equations."
    date: "2026-07-15"
    zenodo: 21370985
    doi: "10.5281/zenodo.21370985"
    summary: >
      Identifies precisely when the abstract minimal completion of Paper 3 can
      be built from real geometry. Čech descent constructs global metrics,
      bundles, connections, and matter fields unique up to bundle isomorphism;
      gauge- and diffeomorphism-invariant relations such as holonomy, Wilson
      observables, characteristic numbers, and operator spectra descend to the
      orbit space of physical configurations and realize the completion on the
      restricted domain, with an exactly solved flat U(1) circle example where
      holonomy alone reconstructs the source though local curvature vanishes.
      Relation-dependent invariant actions then yield correctly normalized
      stress-energy, current, and matter responses, with Ward–Noether
      identities enforcing covariant conservation. The descent and cocycle
      conditions characterize the exact geometric realization domain and its
      failure modes.
    supports: []

  - id: paper:shadow2:5
    slug: observable-quotients-and-exact-projected-dynamics
    number: 5
    category: canonical
    visibility: public
    featured: true
    title: "Observable Quotients and Exact Projected Dynamics: Closure, Memory, Minimal Dynamical Completion, and Effective Field Operators"
    subtitle: "When observable dynamics close autonomously, and the exact price when they do not"
    role: "Develops the observable and dynamical layer: an induced observable evolution exists exactly when the dynamics preserve the readout kernel; otherwise the exact projected law carries an unresolved-initial-state term and a memory kernel, with a minimal dynamical completion measuring exactly what must be restored."
    date: "2026-07-15"
    zenodo: 21371251
    doi: "10.5281/zenodo.21371251"
    summary: >
      The dynamical layer of the framework. A bounded observation operator
      always yields an exact observable quotient; the paper keeps sharply apart
      exact loss, unstable inversion, controlled low-rank approximation, and
      failure of autonomous dynamics. An induced observable evolution exists if
      and only if the source semigroup preserves the readout kernel; when it
      fails, the exact projected equation carries a deterministic
      unresolved-initial-state term and an exact memory kernel, derived without
      stochastic, Markovian, or timescale approximations. The minimal dynamical
      completion is constructed and computed by a Kalman-type observability
      rank in finite dimensions, and sector elimination yields Schur-complement
      effective operators and a covariant effective stress-energy whose total
      conservation includes explicit exchange between sectors.
    supports: []

  - id: paper:shadow2:6
    slug: non-source-projection-and-internal-identifiability
    number: 6
    category: canonical
    visibility: public
    featured: true
    title: "Non-Source Projection and Internal Identifiability"
    subtitle: "Exact criteria for non-source projection, dynamical descent, and internal identifiability"
    role: "Integrates the sequence into the non-source projection theorem: an essential non-gauge distinction inside a readout fiber proves non-source projection for the stated model and target, with exact deterministic and statistical identifiability results."
    date: "2026-07-15"
    zenodo: 21371451
    doi: "10.5281/zenodo.21371451"
    summary: >
      Proves that once a model exhibits two physically inequivalent source
      states sharing the same readout but demanding different answers to a
      nominated target, that readout is a non-source projection for the stated
      model and target. The dynamical consequences divide sharply:
      fiber-preserving evolution descends to an autonomous law even when the
      readout is noninjective, so dynamical closure is evidence of fiber
      preservation, not fiber triviality; fiber-breaking evolution admits no
      deterministic instantaneous law. Under explicit factorization hypotheses,
      no internal probe, statistic, or test at any sample size distinguishes
      fiber members, and a strong lumpability theorem gives the exact condition
      for a projected Markov process to remain Markov. The theorem gives the
      exact specification a physical model must instantiate: source domain,
      physical equivalence, readout, target, and essential witness pair.
    supports: []

  - id: paper:shadow2:7
    slug: bulk-to-brane-projection
    number: 7
    category: canonical
    visibility: public
    featured: true
    title: "Bulk-to-Brane Projection, Dynamical Nonclosure, and Observable Residues in Randall–Sundrum Gravity"
    subtitle: "The physical witness: identical brane readouts, different futures, and linked observable residues in RS2"
    role: "Within RS2 gravity, Paper 7 proves that identical instantaneous brane readouts can evolve into different futures, derives the exact projected Einstein equation, and links cosmological and weak-field residues through a parameter-free relation."
    date: "2026-07-15"
    zenodo: 21371861
    doi: "10.5281/zenodo.21371861"
    summary: >
      Working inside the positive-tension Randall–Sundrum (RS2) braneworld,
      this paper delivers the framework's concrete physical witness: an explicit pair of
      five-dimensional gravitational states identical to a brane observer now
      that evolve to differ later, so the instantaneous brane state admits no
      deterministic evolution law over the full source domain. It derives the
      exact projected Einstein equation line by line, obtains the positive
      high-density rho-squared term and bulk-state dark-radiation term, and
      eliminates the common AdS radius to yield a parameter-free cross-regime
      relation linking cosmology to weak-field gravity. A pushforward theorem
      proves that every brane-only protocol is reproduced exactly by a
      four-dimensional theory of the brane record, establishing the full
      operational-equivalence result.
    supports: []

